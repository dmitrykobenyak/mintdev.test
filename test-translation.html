<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Test</title>
    <script src="js/i18n.js"></script>
</head>
<body>
    <h1>Translation Test</h1>
    <button id="switchLang">Switch to Russian</button>
    <div>
        <p>Navigation translations:</p>
        <ul>
            <li data-i18n="navigation.all">All</li>
            <li data-i18n="navigation.think">Think</li>
            <li data-i18n="navigation.do">Do</li>
            <li data-i18n="navigation.feel">Feel</li>
            <li data-i18n="navigation.favorites">Favorites</li>
        </ul>
    </div>
    
    <script>
        async function init() {
            await window.i18n.loadLanguage('en');
            await window.i18n.loadLanguage('ru');
            await window.i18n.setLanguage('en');
            
            updateTranslations();
            
            document.getElementById('switchLang').addEventListener('click', async () => {
                const currentLang = window.i18n.getCurrentLanguage();
                const newLang = currentLang === 'en' ? 'ru' : 'en';
                await window.i18n.setLanguage(newLang);
                updateTranslations();
                document.getElementById('switchLang').textContent = 
                    newLang === 'en' ? 'Switch to Russian' : 'Switch to English';
            });
        }
        
        function updateTranslations() {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(element => {
                const key = element.getAttribute('data-i18n');
                const translation = window.t(key);
                console.log(`Key: ${key}, Translation: ${translation}`);
                element.textContent = translation;
            });
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
